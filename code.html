<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بۆ تۆ...</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}
body{
    background:#050505;
    color:white;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}
.card{
    background:rgba(20,20,25,.7);
    backdrop-filter:blur(20px);
    border-radius:25px;
    padding:40px;
    width:90%;
    max-width:420px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,.5);
    display:none;
}
.card.active{
    display:block;
}
.icon{
    font-size:60px;
    margin-bottom:15px;
}
h1{
    margin-bottom:10px;
}
p{
    color:#bbb;
    margin-bottom:25px;
}
.btn-container{
    display:flex;
    gap:10px;
    justify-content:center;
}
.btn{
    padding:14px 30px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
}
.btn-open,
.btn-yes{
    background:#ff2a7a;
    color:white;
}
.btn-no{
    background:#222;
    color:white;
}
.confetti{
    position:fixed;
    font-size:24px;
    pointer-events:none;
    animation:fall 4s linear forwards;
}
@keyframes fall{
    from{
        transform:translateY(-100px);
        opacity:1;
    }
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}
</style>
</head>
<body>
<!-- نامە -->
<div id="card-letter" class="card active">
    <div class="icon">💌</div>
    <h1>نامەیەکی تایبەت</h1>
    <p>کرتە لە دوگمەکە بکە بۆ کردنەوەی نامەکە</p>
    <button class="btn btn-open" onclick="openLetter()">
        کردنەوەی نامە
    </button>
</div>
<!-- پرسیار -->
<div id="card-question" class="card">
    <h1>ببمە شەهیدی نیشتیمان؟ 🤍</h1>
    <p>باش بیر بکەرەوە 😄</p>
    <div class="btn-container">
        <button class="btn btn-yes" onclick="sayYes()">بەڵێ</button>
        <button class="btn btn-no" id="btnNo">نەخێر</button>
    </div>
</div>
<!-- کۆتایی -->
<div id="card-success" class="card">
    <div class="icon">❤️</div>
    <h1>باشترین بڕیار بوو!</h1>
    <p>منیش حەز دەکەم ببمێ 🤍</p>
</div>
<script>
function openLetter(){
    document.getElementById("card-letter").classList.remove("active");
    document.getElementById("card-question").classList.add("active");
}
const btnNo = document.getElementById("btnNo");
function moveButton(){
    const maxX = window.innerWidth - btnNo.offsetWidth;
    const maxY = window.innerHeight - btnNo.offsetHeight;
    btnNo.style.position = "fixed";
    btnNo.style.left = Math.random() * maxX + "px";
    btnNo.style.top = Math.random() * maxY + "px";
}
btnNo.addEventListener("mouseenter", moveButton);
btnNo.addEventListener("touchstart", function(e){
    e.preventDefault();
    moveButton();
});
function sayYes(){
    document.getElementById("card-question").classList.remove("active");
    document.getElementById("card-success").classList.add("active");
    createHearts();
}
function createHearts(){
    const emojis = ["❤️","💖","🤍","✨"];
    for(let i=0;i<50;i++){
        setTimeout(()=>{
            const heart = document.createElement("div");
            heart.className = "confetti";
            heart.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
            heart.style.left = Math.random()*100 + "vw";
            document.body.appendChild(heart);
            setTimeout(()=>{
                heart.remove();
            },4000);
        },i*80);
    }
}
</script>
</body>
</html>
``
